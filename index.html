<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NAYT FF Sensitivity</title>
<style>
  :root {
    --bg: #06060c;
    --bg2: #0d0d16;
    --card: #12121e;
    --card2: #181828;
    --border: #1f1f35;
    --border2: #2a2a48;
    --fg: #e4e4f0;
    --fg2: #c0c0d8;
    --muted: #6a6a88;
    --accent: #ff6a00;
    --accent2: #ff9b2e;
    --accent-dim: rgba(255,106,0,0.12);
    --accent-glow: rgba(255,106,0,0.3);
    --fire1: #ff6a00;
    --fire2: #ff3d00;
    --fire3: #c62828;
    --green: #00e676;
    --green-dim: rgba(0,230,118,0.12);
    --red: #ff1744;
    --red-dim: rgba(255,23,68,0.12);
    --yellow: #ffd600;
    --yellow-dim: rgba(255,214,0,0.12);
    --radius: 12px;
    --radius-sm: 8px;
    --radius-xs: 6px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--fg);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  .bg-fx {
    position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
  }
  .bg-fx::before {
    content: '';
    position: absolute; top: -30%; left: -20%; width: 140%; height: 160%;
    background:
      radial-gradient(ellipse 600px 400px at 25% 15%, rgba(255,106,0,0.07), transparent),
      radial-gradient(ellipse 500px 500px at 75% 85%, rgba(198,40,40,0.05), transparent),
      radial-gradient(ellipse 800px 300px at 50% 50%, rgba(255,155,46,0.03), transparent);
    animation: bgMove 25s ease-in-out infinite alternate;
  }
  @keyframes bgMove {
    0% { transform: translate(0,0) scale(1); }
    100% { transform: translate(-2%,1%) scale(1.02); }
  }

  .ember {
    position: absolute; border-radius: 50%; opacity: 0;
    animation: emberRise linear infinite;
  }
  @keyframes emberRise {
    0%   { opacity:0; transform: translateY(0) scale(.4); }
    15%  { opacity:.7; }
    100% { opacity:0; transform: translateY(-140px) scale(0); }
  }

  .app { position: relative; z-index: 1; max-width: 860px; margin: 0 auto; padding: 16px 14px 80px; }

  /* ─── HEADER ─── */
  header { text-align: center; padding: 32px 0 24px; }
  .logo {
    width: 60px; height: 60px; margin: 0 auto 14px;
    background: linear-gradient(135deg, var(--fire1), var(--fire3));
    border-radius: 16px; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 6px 28px var(--accent-glow);
    animation: pulse 3.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { box-shadow: 0 6px 28px var(--accent-glow); transform: scale(1); }
    50% { box-shadow: 0 8px 44px rgba(255,106,0,.45); transform: scale(1.03); }
  }
  .logo svg { width: 30px; height: 30px; fill: #fff; }
  header h1 {
    font-size: clamp(22px,4.5vw,36px); font-weight: 800;
    text-transform: uppercase; letter-spacing: 2px; line-height: 1.15;
    background: linear-gradient(135deg, #fff 40%, var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  header .sub { color: var(--muted); font-size: 13px; margin-top: 6px; font-weight: 400; }
  .offline-badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 10px; margin-top: 10px;
    background: var(--green-dim); border: 1px solid rgba(0,230,118,.18);
    border-radius: 20px; font-size: 10px; font-weight: 700; color: var(--green);
    text-transform: uppercase; letter-spacing: 1px;
  }
  .offline-badge .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: blink 2s infinite; }
  @keyframes blink { 0%,100%{opacity:1}50%{opacity:.3} }

  /* ─── STEPS ─── */
  .steps { display: flex; justify-content: center; gap: 6px; margin-bottom: 28px; }
  .step-d { width: 48px; height: 4px; border-radius: 4px; background: var(--border); transition: all .4s; }
  .step-d.active { background: linear-gradient(90deg,var(--fire1),var(--accent2)); box-shadow: 0 0 10px var(--accent-glow); }
  .step-d.done { background: var(--green); }

  /* ─── CARD ─── */
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 24px 20px; margin-bottom: 16px;
    transition: border-color .3s;
  }
  .card:hover { border-color: var(--border2); }
  .card-h {
    font-size: 15px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px;
    margin-bottom: 18px; display: flex; align-items: center; gap: 10px;
  }
  .card-h svg { width: 16px; height: 16px; fill: var(--accent); flex-shrink: 0; }
  .sn {
    background: linear-gradient(135deg,var(--fire1),var(--fire3)); color: #fff;
    width: 22px; height: 22px; border-radius: 6px; display: flex; align-items: center;
    justify-content: center; font-size: 11px; font-weight: 800; flex-shrink: 0;
  }
  .auto-tag {
    display: none; align-items: center; gap: 4px; padding: 2px 7px;
    background: var(--green-dim); border: 1px solid rgba(0,230,118,.18);
    border-radius: 5px; font-size: 9px; font-weight: 700; color: var(--green);
    text-transform: uppercase; letter-spacing: .5px;
  }
  .auto-tag.show { display: inline-flex; }
  .auto-tag svg { width: 8px; height: 8px; fill: var(--green); }

  /* ─── SEARCH ─── */
  .search { position: relative; margin-bottom: 14px; }
  .search svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 14px; height: 14px; fill: var(--muted); }
  .search input {
    width: 100%; padding: 11px 12px 11px 36px; background: var(--bg2);
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    color: var(--fg); font-size: 13px; outline: none; transition: all .25s;
    font-family: inherit;
  }
  .search input::placeholder { color: var(--muted); }
  .search input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }

  /* ─── DEVICE GRID ─── */
  .dev-cat { margin-bottom: 14px; }
  .cat-lbl {
    font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px;
    color: var(--muted); margin-bottom: 6px; display: flex; align-items: center; gap: 6px;
  }
  .tier { padding: 1px 6px; border-radius: 4px; font-size: 9px; font-weight: 800; letter-spacing: .5px; }
  .tier-low { background: var(--red-dim); color: var(--red); }
  .tier-mid { background: var(--yellow-dim); color: var(--yellow); }
  .tier-high { background: var(--green-dim); color: var(--green); }
  .dev-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 5px; }
  .dev-btn {
    padding: 7px 9px; background: var(--bg2); border: 1px solid transparent;
    border-radius: var(--radius-xs); color: var(--fg2); font-size: 11px; font-weight: 500;
    cursor: pointer; transition: all .18s; text-align: left; font-family: inherit;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .dev-btn:hover { background: var(--card2); border-color: var(--border); }
  .dev-btn.sel { background: var(--accent-dim); border-color: var(--accent); color: var(--accent2); font-weight: 700; }
  .dev-btn.hide { display: none; }
  .no-res { color: var(--muted); font-size: 12px; text-align: center; padding: 20px; }

  /* ─── OPTION BTNS ─── */
  .opt-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 8px; }
  .opt-btn {
    padding: 13px 14px; background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--fg); font-size: 13px; font-weight: 600;
    cursor: pointer; transition: all .22s; display: flex; align-items: center; gap: 10px;
    font-family: inherit;
  }
  .opt-btn svg { width: 18px; height: 18px; fill: var(--muted); transition: fill .22s; flex-shrink: 0; }
  .opt-btn:hover { background: var(--card2); border-color: var(--border2); transform: translateY(-1px); }
  .opt-btn.sel { background: var(--accent-dim); border-color: var(--accent); color: #fff; }
  .opt-btn.sel svg { fill: var(--accent2); }

  /* ─── GEN BTN ─── */
  .gen-btn {
    width: 100%; padding: 16px; border: none; border-radius: 14px; color: #fff;
    font-size: 18px; font-weight: 800; text-transform: uppercase; letter-spacing: 3px;
    cursor: pointer; transition: all .3s; position: relative; overflow: hidden;
    font-family: inherit;
    background: linear-gradient(135deg, var(--fire1), var(--fire2), var(--fire3));
    background-size: 200% 200%; animation: gShift 4s ease infinite;
  }
  @keyframes gShift { 0%,100%{background-position:0% 50%}50%{background-position:100% 50%} }
  .gen-btn::after {
    content:''; position:absolute; inset:0;
    background: linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent);
    transform: translateX(-100%); transition: transform .5s;
  }
  .gen-btn:hover::after { transform: translateX(100%); }
  .gen-btn:hover { box-shadow: 0 8px 36px rgba(255,106,0,.35); transform: translateY(-2px); }
  .gen-btn:active { transform: translateY(0); }
  .gen-btn:disabled { opacity:.35; cursor:not-allowed; transform:none!important; box-shadow:none!important; }
  .gen-btn:disabled::after { display:none; }

  /* ─── RESULT ─── */
  .result { display:none; animation: rSlide .5s ease; }
  .result.show { display:block; }
  @keyframes rSlide { from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)} }

  .r-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
  .r-head h2 { font-size: 20px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; display:flex; align-items:center; gap:8px; }
  .r-head h2 svg { width: 20px; height: 20px; fill: var(--accent); }
  .r-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .act-btn {
    padding: 9px 16px; background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--fg); font-size: 12px; font-weight: 700;
    cursor: pointer; transition: all .2s; display: flex; align-items: center; gap: 6px;
    font-family: inherit;
  }
  .act-btn svg { width: 13px; height: 13px; fill: var(--muted); transition: fill .2s; }
  .act-btn:hover { border-color: var(--accent); background: var(--accent-dim); }
  .act-btn:hover svg { fill: var(--accent2); }
  .act-btn.ok { border-color: var(--green); color: var(--green); }
  .act-btn.ok svg { fill: var(--green); }

  /* Tags */
  .tags { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 22px; }
  .tag {
    padding: 5px 12px; background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius-xs); font-size: 11px; font-weight: 700;
    display: flex; align-items: center; gap: 5px;
  }
  .tag svg { width: 11px; height: 11px; fill: var(--accent); }

  /* ─── SENS ROWS ─── */
  .s-row {
    display: flex; align-items: center; gap: 14px; padding: 12px 0;
    border-bottom: 1px solid rgba(31,31,53,.6);
  }
  .s-row:last-child { border-bottom: none; }
  .s-lbl { width: 100px; font-size: 12px; font-weight: 700; color: var(--muted); flex-shrink:0; letter-spacing:.3px; }
  .s-bar-wrap { flex: 1; height: 7px; background: var(--bg2); border-radius: 7px; overflow: hidden; }
  .s-bar { height: 100%; border-radius: 7px; transition: width .7s cubic-bezier(.22,1,.36,1); width: 0; }
  .s-val { width: 36px; text-align: right; font-size: 19px; font-weight: 800; flex-shrink: 0; font-variant-numeric: tabular-nums; }
  .bl { background: linear-gradient(90deg, #c62828, #ff3d00); }
  .bm { background: linear-gradient(90deg, #ff6a00, #ff9b2e); }
  .bh { background: linear-gradient(90deg, #ff9b2e, #ffd600); }
  .bv { background: linear-gradient(90deg, #ffd600, #00e676); }

  /* Slider row */
  .adj-row { display: flex; align-items: center; gap: 14px; padding: 6px 0; }
  .adj-slider {
    flex: 1; -webkit-appearance: none; appearance: none;
    height: 4px; background: var(--border); border-radius: 4px; outline: none;
    cursor: pointer;
  }
  .adj-slider::-webkit-slider-thumb {
    -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%;
    background: var(--accent); cursor: pointer; box-shadow: 0 0 8px var(--accent-glow);
  }
  .adj-slider::-moz-range-thumb {
    width: 14px; height: 14px; border-radius: 50%; border: none;
    background: var(--accent); cursor: pointer; box-shadow: 0 0 8px var(--accent-glow);
  }

  /* Toggle */
  .toggle-row { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; cursor: pointer; }
  .toggle-track {
    width: 38px; height: 20px; background: var(--border); border-radius: 20px;
    position: relative; transition: background .3s; flex-shrink: 0;
  }
  .toggle-track.on { background: var(--accent); }
  .toggle-track::after {
    content: ''; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px;
    background: #fff; border-radius: 50%; transition: transform .3s;
  }
  .toggle-track.on::after { transform: translateX(18px); }
  .toggle-lbl { font-size: 12px; font-weight: 600; color: var(--muted); }

  /* Tip */
  .tip {
    background: rgba(255,106,0,.04); border: 1px solid rgba(255,106,0,.12);
    border-radius: var(--radius-sm); padding: 16px 18px; margin-top: 18px;
  }
  .tip h4 {
    font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px;
    color: var(--accent2); margin-bottom: 6px; display: flex; align-items: center; gap: 6px;
  }
  .tip h4 svg { width: 14px; height: 14px; fill: var(--accent2); }
  .tip p { font-size: 12.5px; color: var(--muted); line-height: 1.65; }

  /* ─── HISTORY ─── */
  .hist-card { margin-top: 24px; }
  .hist-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px; background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius-xs); margin-bottom: 6px; cursor: pointer;
    transition: all .2s; gap: 10px;
  }
  .hist-item:hover { border-color: var(--border2); background: var(--card2); }
  .hist-info { flex: 1; min-width: 0; }
  .hist-info .hi-name { font-size: 12px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .hist-info .hi-meta { font-size: 10px; color: var(--muted); margin-top: 2px; }
  .hist-vals { display: flex; gap: 6px; flex-shrink: 0; }
  .hist-v { font-size: 10px; font-weight: 800; color: var(--accent2); background: var(--accent-dim); padding: 2px 6px; border-radius: 4px; }
  .hist-del {
    width: 24px; height: 24px; border: none; background: transparent;
    color: var(--muted); cursor: pointer; border-radius: 4px; transition: all .2s;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .hist-del:hover { background: var(--red-dim); color: var(--red); }
  .hist-del svg { width: 12px; height: 12px; fill: currentColor; }
  .empty-hist { text-align: center; color: var(--muted); font-size: 12px; padding: 24px; }

  /* ─── TOAST ─── */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(70px);
    padding: 10px 20px; background: var(--card); border: 1px solid var(--green);
    border-radius: var(--radius-sm); color: var(--green); font-size: 12px; font-weight: 700;
    z-index: 200; opacity: 0; transition: all .35s cubic-bezier(.22,1,.36,1);
    display: flex; align-items: center; gap: 6px; pointer-events: none; white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast svg { width: 14px; height: 14px; fill: var(--green); }

  /* ─── SCROLLBAR ─── */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 5px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

  /* ─── RESPONSIVE ─── */
  @media(max-width:600px){
    .app{padding:10px 10px 60px}
    .card{padding:18px 14px}
    .dev-grid{grid-template-columns:repeat(auto-fill,minmax(100px,1fr))}
    .opt-grid{grid-template-columns:1fr 1fr}
    .s-lbl{width:78px;font-size:10px}
    .s-val{font-size:16px;width:30px}
    .r-head{flex-direction:column;align-items:flex-start}
    .tag{font-size:10px;padding:4px 8px}
  }
  @media(prefers-reduced-motion:reduce){
    *,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}
  }

  /* Print / export canvas hidden */
  #expCanvas { display: none; }
</style>
</head>
<body>

<div class="bg-fx" id="bgFx"></div>

<div class="app">
  <header>
    <div class="logo">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm-1-13h2v6h-2zm0 8h2v2h-2z"/><circle cx="12" cy="12" r="3" fill="none" stroke="#fff" stroke-width="1.5"/><line x1="12" y1="2" x2="12" y2="6" stroke="#fff" stroke-width="1.5"/><line x1="12" y1="18" x2="12" y2="22" stroke="#fff" stroke-width="1.5"/><line x1="2" y1="12" x2="6" y2="12" stroke="#fff" stroke-width="1.5"/><line x1="18" y1="12" x2="22" y2="12" stroke="#fff" stroke-width="1.5"/></svg>
    </div>
    <h1>NAYT<br>Free Fire Sensitivity</h1>
    <p class="sub">Precision-tuned for your exact device and playstyle</p>
    <div class="offline-badge"><span class="dot"></span> 100% Offline</div>
  </header>

  <div class="steps">
    <div class="step-d active" id="s1"></div>
    <div class="step-d" id="s2"></div>
    <div class="step-d" id="s3"></div>
    <div class="step-d" id="s4"></div>
  </div>

  <!-- Step 1: Device -->
  <div class="card">
    <div class="card-h">
      <span class="sn">1</span> Select Your Device
      <svg viewBox="0 0 24 24"><path d="M17 1.01L7 1c-1.1 0-2 .9-2 2v18c0 1.1.9 2 2 2h10c1.1 0 2-.9 2-2V3c0-1.1-.9-1.99-2-1.99zM17 19H7V5h10v14z"/></svg>
    </div>
    <div class="search">
      <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      <input type="text" id="devSearch" placeholder="Search device name..." autocomplete="off">
    </div>
    <div id="devList"></div>
  </div>

  <!-- Step 2: Performance -->
  <div class="card">
    <div class="card-h">
      <span class="sn">2</span> Performance
      <span class="auto-tag" id="autoPerf"><svg viewBox="0 0 24 24"><path d="M7 2v11h3v9l7-12h-4l4-8z"/></svg> Auto</span>
      <svg viewBox="0 0 24 24"><path d="M12 2c-5.52 0-10 4.48-10 10s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zM17.9 17.39A9.826 9.826 0 0012 4c-1.67 0-3.22.42-4.6 1.15l2.6 2.6c.68-.15 1.39-.25 2-.25 3.87 0 7 3.13 7 7 0 .61-.1 1.32-.25 2l2.15 1.89z"/></svg>
    </div>
    <div class="opt-grid" id="perfGrid"></div>
  </div>

  <!-- Step 3: Screen Size -->
  <div class="card">
    <div class="card-h">
      <span class="sn">3</span> Screen Size
      <span class="auto-tag" id="autoScr"><svg viewBox="0 0 24 24"><path d="M7 2v11h3v9l7-12h-4l4-8z"/></svg> Auto</span>
      <svg viewBox="0 0 24 24"><path d="M21 3H3c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H3V5h18v14z"/></svg>
    </div>
    <div class="opt-grid" id="scrGrid"></div>
  </div>

  <!-- Step 4: Playstyle -->
  <div class="card">
    <div class="card-h">
      <span class="sn">4</span> Playstyle
      <svg viewBox="0 0 24 24"><path d="M21 6H3c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-10 7H8v3H6v-3H3v-2h3V8h2v3h3v2zm4.5 2c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm4-3c-.83 0-1.5-.67-1.5-1.5S18.67 9 19.5 9s1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg>
    </div>

function pickDev(d){
  selDev=d;
  autoP=true; sel.perf=d.p;
  document.getElementById('autoPerf').classList.add('show');
  hilite('perf',d.p);

  autoS=true; sel.screen=d.s;
  document.getElementById('autoScr').classList.add('show');
  hilite('screen',d.s);

  buildDevs(document.getElementById('devSearch').value.trim());
  steps(); ready();
}

function pickOpt(type,val){
  sel[type]=val;
  if(type==='perf'){autoP=false;document.getElementById('autoPerf').classList.remove('show')}
  if(type==='screen'){autoS=false;document.getElementById('autoScr').classList.remove('show')}
  hilite(type,val);
  steps(); ready();
}

function hilite(type,val){
  const gid=type==='perf'?'perfGrid':type==='screen'?'scrGrid':'styleGrid';
  document.getElementById(gid).querySelectorAll('.opt-btn').forEach(b=>{
    b.classList.toggle('sel',b.dataset.value===val);

function steps(){
  const s1=document.getElementById('s1'),s2=document.getElementById('s2'),
        s3=document.getElementById('s3'),s4=document.getElementById('s4');
  s1.className='step-d '+(selDev?'done':'active');
  s2.className='step-d '+((sel.perf)?'done':(selDev?'active':''));
  s3.className='step-d '+((sel.screen)?'done':(sel.perf?'active':''));
  s4.className='step-d '+((sel.style)?'done':(sel.screen?'active':''));
}

function ready(){
  document.getElementById('genBtn').disabled = !(sel.perf && sel.screen && sel.style);
}

// ═══════════════════════════════════════════
// CALCULATION ENGINE
// ═══════════════════════════════════════════
function calc(){
  const {perf,screen,style}=sel;

  // Base per playstyle
  let bases;
  if(style==='Freestyle') bases={General:194,"Red Dot":186,"2x Scope":164,"4x Scope":140,"AWM Scope":112,"Free Look":144};
  else if(style==='Sniper') bases={General:156,"Red Dot":150,"2x Scope":172,"4x Scope":110,"AWM Scope":88,"Free Look":124};
  else bases={General:174,"Red Dot":168,"2x Scope":148,"4x Scope":126,"AWM Scope":100,"Free Look":134};

  // Performance adjust
  let pa = perf==='Low-end'? -4 : perf==='Mid-range'? 0 : 3;

  // Screen adjust
  let sa = screen==='Small'? 3 : screen==='Medium'? 0 : -3;

  // RAM adjust
  let ra = 0;
  if(selDev){
    ra = selDev.r==='2GB'? -3 : selDev.r==='3GB'? -1 : selDev.r==='4GB'? 0 : 1;
  } else {
    ra = perf==='Low-end'? -2 : perf==='Mid-range'? 0 : 1;
  }

  // Fine playstyle tweaks per scope
  let st = {};
  if(style==='FreeStyle'){
    st={"General":2,"Red Dot":3,"2x Scope":0,"4x Scope":-2,"AWM Scope":-4,"Free Look":1};
  } else if(style==='Sniper'){
    st={"General":-1,"Red Dot":0,"2x Scope":-1,"4x Scope":-2,"AWM Scope":-3,"Free Look":3};
  } else {
    st={"General":0,"Red Dot":0,"2x Scope":0,"4x Scope":0,"AWM Scope":0,"Free Look":0};
  }

  const res={};
  KEYS.forEach(k=>{
    let v=bases[k]+pa+sa+ra+st[k];
    v=Math.max(RANGES[k][0],Math.min(RANGES[k][1],Math.round(v)));
    res[k]=v;
  });

  // Enforce smooth progression
  for(let i=1;i<PROG.length;i++){
    if(res[PROG[i]]>res[PROG[i-1]]) res[PROG[i]]=res[PROG[i-1]];
  }

  // Clamp Free Look independently
  res["Free Look"]=Math.max(RANGES["Free Look"][0],Math.min(RANGES["Free Look"][1],res["Free Look"]));

  return res;
}

// ═══════════════════════════════════════════
// RENDER BARS
// ═══════════════════════════════════════════
function renderBars(){
  const c=document.getElementById('sensDisplay');
  c.innerHTML='';
  KEYS.forEach((k,i)=>{
    const v=result[k];
    const pct=((v-RANGES[k][0])/(RANGES[k][1]-RANGES[k][0]))*100;
    const bc=pct<33?'bl':pct<66?'bm':pct<85?'bh':'bv';
    const vc=pct<33?'#ff3d00':pct<66?'#ff9b2e':pct<85?'#ffd600':'#00e676';

    const row=document.createElement('div');
    row.className='s-row';
    row.innerHTML=`<div class="s-lbl">${k}</div><div class="s-bar-wrap"><div class="s-bar ${bc}" id="bar_${i}"></div></div><div class="s-val" style="color:${vc}" id="val_${i}">${v}</div>`;
    c.appendChild(row);
    setTimeout(()=>{document.getElementById('bar_'+i).style.width=pct+'%'},80+i*70);
  });
}

// ═══════════════════════════════════════════
// RENDER SLIDERS
// ═══════════════════════════════════════════
function renderSliders(){
  const c=document.getElementById('sensSliders');
  c.innerHTML='';
  KEYS.forEach((k,i)=>{
    const row=document.createElement('div');
    row.className='adj-row';
    const sl=document.createElement('input');
    sl.type='range'; sl.className='adj-slider'; sl.min=RANGES[k][0]; sl.max=RANGES[k][1]; sl.value=result[k];
    sl.id='sl_'+i;

    const val=document.createElement('div');
    val.className='s-val'; val.style.fontSize='14px'; val.style.width='30px';
    val.id='slv_'+i; val.textContent=result[k];
    const pct=((result[k]-RANGES[k][0])/(RANGES[k][1]-RANGES[k][0]))*100;
    val.style.color=pct<33?'#ff3d00':pct<66?'#ff9b2e':pct<85?'#ffd600':'#00e676';

    const lbl=document.createElement('div');
    lbl.className='s-lbl'; lbl.style.fontSize='11px'; lbl.textContent=k;

    sl.addEventListener('input',function(){
      const nv=parseInt(this.value);
      result[k]=nv;
      val.textContent=nv;
      const np=((nv-RANGES[k][0])/(RANGES[k][1]-RANGES[k][0]))*100;
      val.style.color=np<33?'#ff3d00':np<66?'#ff9b2e':np<85?'#ffd600':'#00e676';
      // Update bar
      const bar=document.getElementById('bar_'+i);
      if(bar) bar.style.width=np+'%';
      const vbar=document.getElementById('val_'+i);
      if(vbar){vbar.textContent=nv;vbar.style.color=val.style.color}
    });

    row.appendChild(lbl);
    row.appendChild(sl);
    row.appendChild(val);
    c.appendChild(row);
  });
}

document.getElementById('saveBtn').addEventListener('click',function(){

  hist.unshift({
    id: Date.now(),

    perf: sel.perf, screen: sel.screen, style: sel.style,
    vals: {...result},

  this.innerHTML='<svg viewBox="0 0 24 24" width="13" height="13" fill="var(--green)"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg> Saved';

  loadHist();
});

function loadHist(){
  const hist=JSON.parse(localStorage.getItem('ff_hist')||'[]');
  const card=document.getElementById('histCard');
  const list=document.getElementById('histList');
  if(!hist.length){card.style.display='none';return;}
  card.style.display='block';
  list.innerHTML='';
  hist.forEach(h=>{
    const el=document.createElement('div');
    el.className='hist-item';
    const vals=KEYS.map(k=>`<span class="hist-v">${h.vals[k]}</span>`).join('');
    el.innerHTML=`<div class="hist-info"><div class="hi-name">${h.dev}</div><div class="hi-meta">${h.perf} / ${h.screen} / ${h.style} — ${h.date}</div></div><div class="hist-vals">${vals}</div><button class="hist-del" aria-label="Delete"><svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg></button>`;
    el.querySelector('.hist-del').addEventListener('click',function(e){
      e.stopPropagation();
      const nh=hist.filter(x=>x.id!==h.id);
      localStorage.setItem('ff_hist',JSON.stringify(nh));
      loadHist();
      toast('Entry removed');
    });
    el.addEventListener('click',()=>{
      result={...h.vals};
      sel.perf=h.perf; sel.screen=h.screen; sel.style=h.style;
      // Try to find device
      selDev=DB.find(d=>d.n===h.dev)||null;
      if(selDev){autoP=true;autoS=true;document.getElementById('autoPerf').classList.add('show');document.getElementById('autoScr').classList.add('show');}
      hilite('perf',h.perf);hilite('screen',h.screen);hilite('style',h.style);
      document.getElementById('resultPanel').classList.add('show');
      slidersOn=false;document.getElementById('adjTrack').classList.remove('on');
      // Re-render tags
      const tags=document.getElementById('tags');
      tags.innerHTML='';
      [{t:h.dev},{t:h.perf},{t:h.screen},{t:h.style}].forEach(t=>{
        const e2=document.createElement('div');e2.className='tag';e2.innerHTML='<svg viewBox="0 0 24 24" width="11" height="11" fill="var(--accent)"><circle cx="12" cy="12" r="3"/></svg> '+t.t;tags.appendChild(e2);
      });
      renderBars();renderSliders();loadHist();
      steps();ready();
      toast('Loaded saved settings');
    });
    list.appendChild(el);
  });
}

// EXPORT IMAGE (Canvas)
// ═══════════════════════════════════════════
document.getElementById('imgBtn').addEventListener('click',function(){
  if(!result) return;
  const cv=document.getElementById('expCanvas');
  const W=600, H=480;
  cv.width=W; cv.height=H;
  const ctx=cv.getContext('2d');

  // Background
  ctx.fillStyle='#0a0a14';
  ctx.fillRect(0,0,W,H);

  // Accent bar top
  const grd=ctx.createLinearGradient(0,0,W,0);
  grd.addColorStop(0,'#ff6a00');
  grd.addColorStop(1,'#c62828');
  ctx.fillStyle=grd;
  ctx.fillRect(0,0,W,4);

  // Title
  ctx.fillStyle='#ffffff';
  ctx.font='bold 22px -apple-system, sans-serif';
  ctx.fillText('Free Fire Sensitivity', 24, 44);
  ctx.fillStyle='#6a6a88';
  ctx.font='12px -apple-system, sans-serif';
  ctx.fillText(`${selDev?selDev.n:'Custom'}  |  ${sel.perf}  |  ${sel.screen}  |  ${sel.style}`, 24, 66);

  // Separator
  ctx.strokeStyle='#1f1f35';
  ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(24,80);ctx.lineTo(W-24,80);ctx.stroke();

  // Rows
  const startY=112;
  const rowH=52;
  KEYS.forEach((k,i)=>{
    const y=startY+i*rowH;
    const v=result[k];
    const pct=(v-RANGES[k][0])/(RANGES[k][1]-RANGES[k][0]);

    // Label
    ctx.fillStyle='#8888a0';
    ctx.font='bold 13px -apple-system, sans-serif';
    ctx.fillText(k, 24, y);

    // Bar bg
    ctx.fillStyle='#1a1a2e';
    roundRect(ctx,130,y-14,W-200,10,5);
    ctx.fill();

    // Bar fill
    const barW=Math.max(4,(W-200)*pct);
    const barGrd=ctx.createLinearGradient(130,0,130+barW,0);
    if(pct<.33){barGrd.addColorStop(0,'#c62828');barGrd.addColorStop(1,'#ff3d00')}
    else if(pct<.66){barGrd.addColorStop(0,'#ff6a00');barGrd.addColorStop(1,'#ff9b2e')}
    else if(pct<.85){barGrd.addColorStop(0,'#ff9b2e');barGrd.addColorStop(1,'#ffd600')}
    else{barGrd.addColorStop(0,'#ffd600');barGrd.addColorStop(1,'#00e676')}
    ctx.fillStyle=barGrd;
    roundRect(ctx,130,y-14,barW,10,5);
    ctx.fill();

    // Value
    ctx.fillStyle=pct<.33?'#ff3d00':pct<.66?'#ff9b2e':pct<.85?'#ffd600':'#00e676';
    ctx.font='bold 20px -apple-system, sans-serif';
    ctx.textAlign='right';
    ctx.fillText(v.toString(), W-24, y+2);
    ctx.textAlign='left';
  });

  // Footer
  ctx.fillStyle='#333350';
  ctx.font='10px -apple-system, sans-serif';
  ctx.fillText('FF Sensitivity Optimizer — Offline Tool', 24, H-16);

  // Download
  const link=document.createElement('a');
  link.download='ff-sensitivity.png';
  link.href=cv.toDataURL('image/png');
  link.click();
  toast('Image saved');
});

function roundRect(ctx,x,y,w,h,r){
  r=Math.min(r,w/2,h/2);
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

// ═══════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════
function toast(msg){
  const t=document.getElementById('toast');
  document.getElementById('toastMsg').textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

loadHist();
